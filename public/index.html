<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoApplier Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Auto<span class="gradient-text">Applier</span></h1>
            <p>Automated intelligence for your internship hunt.</p>
        </header>

        <main>
            <section class="glass-card">
                <h2>Launch Automation</h2>
                <div class="input-group">
                    <input type="text" id="apply-url" placeholder="Enter Greenhouse Job URL...">
                    <button id="btn-apply" class="btn-primary">Apply Now</button>
                </div>
            </section>

            <section class="glass-card">
                <h2>Scrape Job Board</h2>
                <div class="input-group">
                    <input type="text" id="scrape-url" placeholder="Target Greenhouse Board (e.g. figma)">
                    <input type="text" id="scrape-keyword" placeholder="Keyword (e.g. Intern)">
                    <button id="btn-scrape" class="btn-secondary">Scrape Links</button>
                </div>
                <div id="scrape-results" class="results-container"></div>
            </section>

            <section class="glass-card">
                <h2>Application History</h2>
                <div class="table-container">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Company</th>
                                <th>Role</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
